<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="app-favicon" rel="icon" type="image/svg+xml" href="/tensor.svg?v=boot" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0808" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>tensor-ide</title>
    <style>
      body { margin: 0; background: #0a0808; }
      #tensor-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #0a0808;
        transition: opacity 0.5s ease;
      }
      #tensor-splash.fade { opacity: 0; pointer-events: none; }
      #tensor-splash img { width: 72px; height: 72px; animation: splash-pulse 1.8s ease-in-out infinite; }
      #tensor-splash span {
        margin-top: 16px; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 13px; font-weight: 800; letter-spacing: 0.25em;
        background: linear-gradient(135deg, #a0b4ff, #c4b5fd);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.06); }
      }
    </style>
  </head>
  <body>
    <div id="tensor-splash"><img id="tensor-splash-logo" src="/tensor.svg?v=boot" alt="H" /><span>TENSOR</span></div>
    <div id="root"></div>
    <script>
      (async function initLogoVersion() {
        try {
          const res = await fetch('/api/logo_version', { cache: 'no-store' });
          if (!res.ok) return;
          const data = await res.json();
          const v = encodeURIComponent(String(data.version || Date.now()));
          const logo = document.getElementById('tensor-splash-logo');
          if (logo) logo.src = '/tensor.svg?v=' + v;
          const icon = document.getElementById('app-favicon');
          if (icon) icon.href = '/tensor.svg?v=' + v;
        } catch {}
      })();

      window.addEventListener('error', function(e) {
        var div = document.createElement('div');
        div.style.cssText = 'color: red; padding: 20px; z-index: 9999; position: absolute; top: 0; left: 0; background: black; overflow: auto; max-height: 100vh;';
        div.innerHTML = '<pre>' + (e.error && e.error.stack ? e.error.stack : e.message + '\\n' + e.filename + ':' + e.lineno) + '</pre>';
        document.body.appendChild(div);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var div = document.createElement('div');
        div.style.cssText = 'color: red; padding: 20px; z-index: 9999; position: absolute; top: 0; left: 0; background: black;';
        div.innerHTML = 'Unhandled Rejection: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason);
        document.body.appendChild(div);
      });
    </script>
    <script type="module" src="/frontend/main.tsx"></script>
  </body>
</html>
