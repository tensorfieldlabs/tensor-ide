<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Full 5x4 grid, dim squares as ghost -->
  <!-- Row 1 - all bright (top bar of T) -->
  <rect x="10.5" y="18" width="13" height="13" rx="2" fill="white"/>
  <rect x="25.5" y="18" width="13" height="13" rx="2" fill="white"/>
  <rect x="40.5" y="18" width="13" height="13" rx="2" fill="white"/>
  <rect x="55.5" y="18" width="13" height="13" rx="2" fill="white"/>
  <rect x="70.5" y="18" width="13" height="13" rx="2" fill="white"/>
  <!-- Row 2 - ghost, ghost, bright, ghost, ghost -->
  <rect x="10.5" y="33.5" width="13" height="13" rx="2" fill="white" opacity="0.12"/>
  <rect x="25.5" y="33.5" width="13" height="13" rx="2" fill="white" opacity="0.12"/>
  <rect x="40.5" y="33.5" width="13" height="13" rx="2" fill="white"/>
  <rect x="55.5" y="33.5" width="13" height="13" rx="2" fill="white" opacity="0.12"/>
  <rect x="70.5" y="33.5" width="13" height="13" rx="2" fill="white" opacity="0.12"/>
  <!-- Row 3 -->
  <rect x="10.5" y="49" width="13" height="13" rx="2" fill="white" opacity="0.12"/>
  <rect x="25.5" y="49" width="13" height="13" rx="2" fill="white" opacity="0.12"/>
  <rect x="40.5" y="49" width="13" height="13" rx="2" fill="white"/>
  <rect x="55.5" y="49" width="13" height="13" rx="2" fill="white" opacity="0.12"/>
  <rect x="70.5" y="49" width="13" height="13" rx="2" fill="white" opacity="0.12"/>
  <!-- Row 4 -->
  <rect x="10.5" y="64.5" width="13" height="13" rx="2" fill="white" opacity="0.12"/>
  <rect x="25.5" y="64.5" width="13" height="13" rx="2" fill="white" opacity="0.12"/>
  <rect x="40.5" y="64.5" width="13" height="13" rx="2" fill="white"/>
  <rect x="55.5" y="64.5" width="13" height="13" rx="2" fill="white" opacity="0.12"/>
  <rect x="70.5" y="64.5" width="13" height="13" rx="2" fill="white" opacity="0.12"/>
</svg>
